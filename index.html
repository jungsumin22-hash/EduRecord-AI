let selected=new Set(), current="전체", variant=0;
const $=id=>document.getElementById(id);
function flat(){
 let a=[];
 Object.entries(DB.behaviors).forEach(([cat,groups])=>{
  Object.entries(groups).forEach(([group,items])=>{
   items.forEach(label=>a.push({cat,group,label}));
  });
 });
 return a;
}
function key(x){return x.cat+"||"+x.group+"||"+x.label}
function init(){renderTabs();renderList();renderSel();}
function renderTabs(){
 const cats=["전체",...Object.keys(DB.behaviors)];
 $("tabs").innerHTML="";
 cats.forEach(c=>{let b=document.createElement("button");b.className="tab"+(c==current?" on":"");b.textContent=c;b.onclick=()=>{current=c;renderTabs();renderList()};$("tabs").appendChild(b)});
}
function renderList(){
 $("list").innerHTML="";
 let arr=flat().filter(x=>current=="전체"||x.cat==current);
 let groups={}; arr.forEach(x=>{let g=x.cat+" · "+x.group;(groups[g]??=[]).push(x)});
 Object.entries(groups).forEach(([g,items])=>{
  let title=document.createElement("div");title.className="group";title.textContent=g;$("list").appendChild(title);
  items.forEach(x=>{let s=document.createElement("span");s.className="chip"+(selected.has(key(x))?" on":"");s.textContent=x.label;s.onclick=()=>{selected.has(key(x))?selected.delete(key(x)):selected.add(key(x));renderList();renderSel()};$("list").appendChild(s)});
 });
}
function selItems(){return [...selected].map(k=>{let [cat,group,label]=k.split("||");return {cat,group,label}})}
function renderSel(){
 $("selected").innerHTML="";
 if(!selected.size){$("selected").innerHTML='<span class="chip">선택 없음</span>';$("profile").textContent="";return}
 selItems().forEach(x=>{let s=document.createElement("span");s.className="chip on";s.textContent="× "+x.label;s.onclick=()=>{selected.delete(key(x));renderList();renderSel()};$("selected").appendChild(s)});
 $("profile").innerHTML="<b>역량 추론:</b> "+infer().join(" · ");
}
function autoPick(){
 let memo=$("memo").value;
 flat().forEach(x=>{let c=x.label.replace(/함|는|을|를|이|가|에게/g,"").slice(0,4);if(c&&memo.includes(c))selected.add(key(x))});
 renderList();renderSel();
}
function resetAll(){selected.clear();$("memo").value="";$("out").textContent="결과가 여기에 표시됩니다.";renderList();renderSel()}
function infer(){
 let text=selItems().map(x=>x.label).join(" ")+$("memo").value;
 let out=[];
 Object.entries(DB.competency_map).forEach(([k,words])=>{if(words.some(w=>text.includes(w)))out.push(k)});
 return out.length?out:["성장가능성"];
}
function pick(arr){return arr[variant%arr.length]}
function find(cat){let a=selItems().filter(x=>x.cat==cat).map(x=>x.label);return a[variant%Math.max(1,a.length)]||""}
function trait(){
 let p=DB.personality;
 let keys=Object.keys(p);
 return p[keys[variant%keys.length]][variant%p[keys[variant%keys.length]].length];
}
function growth(){
 let memo=$("memo").value;
 for(const [k,v] of Object.entries(DB.growth_map)){ if(memo.includes(k) || selItems().some(x=>x.label.includes(k))) return v; }
 return "현재의 강점을 바탕으로 다양한 경험 속에서 자신의 역량을 더욱 넓혀 갈 것으로 기대됨.";
}
function clean(t){
 Object.entries(DB.forbidden.replace).forEach(([bad,good])=>{t=t.replaceAll(bad,good)});
 return t.replace(/\s+/g," ").replace(/\.+/g,".").trim();
}
function generate(){
 let learning=find("학습")||find("장점")||"학습 활동에 성실하게 참여함";
 let life=find("생활")||"공동체의 약속을 소중히 여김";
 let rel=find("관계")||"친구들과 원만하게 어울림";
 let lead=find("리더십");
 let art=find("예체능·창의");
 let parts=[];
 parts.push(DB.teacher_phrases.opening[variant%DB.teacher_phrases.opening.length].replace("{trait}",trait()));
 if(lead) parts.push(pick(DB.teacher_phrases.leadership).replace("{behavior}",lead));
 parts.push(pick(DB.teacher_phrases.learning).replace("{behavior}",learning));
 parts.push(pick(DB.teacher_phrases.life).replace("{behavior}",life));
 parts.push(pick(DB.teacher_phrases.relation).replace("{behavior}",rel));
 if(art) parts.push(pick(DB.teacher_phrases.art).replace("{behavior}",art));
 parts.push(pick(DB.teacher_phrases.growth).replace("{growth}",growth()));
 $("out").textContent=clean(parts.join(" "));
}
init();
</script>
</body>
