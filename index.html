<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EduRecord AI v20</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <h1>📘 EduRecord AI v20</h1>
      <p>구체 키워드 선택 → 학생 성향 분석 → 교사 문체 행발 생성</p>
    </div>
    <div class="badge">분리형 프로젝트 · 안정판</div>
  </header>

  <main class="app">
    <section class="card input-card">
      <h2>1. 학생 관찰 입력</h2>
      <div class="grid">
        <label>학생 이름/번호
          <input id="student" placeholder="예: 김OO / 12번" />
        </label>
        <label>목표 분량
          <select id="targetBytes">
            <option value="650">650 byte 내외</option>
            <option value="750" selected>750 byte 내외</option>
            <option value="850">850 byte 내외</option>
          </select>
        </label>
        <label>문체
          <select id="tone">
            <option value="veteran" selected>생활기록부 베테랑</option>
            <option value="warm">따뜻한 담임</option>
            <option value="growth">성장 중심</option>
            <option value="official">공식 문체</option>
          </select>
        </label>
        <label>문장 강도
          <select id="detail">
            <option value="normal" selected>일반</option>
            <option value="specific">매우 구체적</option>
            <option value="compact">간결</option>
          </select>
        </label>
      </div>

      <label class="full">자유 메모
        <textarea id="memo" placeholder="예: 반장, 친구 의견을 모아 정리함, 수학을 꾸준히 노력함, 친구를 자연스럽게 챙김, 규칙을 잘 지킴"></textarea>
      </label>

      <div class="btns">
        <button id="autoPickBtn">메모로 자동 선택</button>
        <button id="clearBtn" class="gray">초기화</button>
      </div>
    </section>

    <section class="card keyword-card">
      <h2>2. 관찰 키워드 선택</h2>
      <input id="search" class="search" placeholder="검색: 발표, 친구, 책임, 정리, 수학, 반장, 장난..." />
      <div id="tabs" class="tabs"></div>
      <div id="keywordList" class="keyword-list">키워드 불러오는 중...</div>
    </section>

    <section class="card selected-card">
      <h2>3. 선택한 키워드</h2>
      <div id="selectedList" class="selected-list"></div>
      <h3>학생 성향 분석</h3>
      <div id="profileBox" class="profile-box">아직 선택한 키워드가 없습니다.</div>
    </section>

    <section class="card result-card">
      <h2>4. 생성 결과</h2>
      <div class="btns">
        <button id="generateBtn">✨ 행발 생성하기</button>
        <button id="regenerateBtn" class="gray">다른 문장으로 다시</button>
      </div>
      <div id="resultArea" class="result-area">생성 버튼을 누르면 결과가 표시됩니다.</div>
    </section>
  </main>

  <footer>EduRecord AI v20 · GitHub Pages 배포 가능</footer>
  <script src="script.js"></script>
</body>
</html>
