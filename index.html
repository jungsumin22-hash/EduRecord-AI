function init(){renderTabs();renderList();renderSel();$("search").oninput=renderList;$("autoPickBtn").onclick=autoPick;$("clearBtn").onclick=clearAll;$("generateBtn").onclick=generate;$("regenerateBtn").onclick=()=>{variant++;generate()}}
function renderTabs(){$("tabs").innerHTML="";["전체",...Object.keys(KW)].forEach(c=>{let b=document.createElement("button");b.className="tab"+(c==current?" active":"");b.textContent=c;b.onclick=()=>{current=c;renderTabs();renderList()};$("tabs").appendChild(b)})}
function renderList(){const q=$("search").value.trim();const box=$("keywordList");box.innerHTML="";const arr=allItems().filter(x=>(current=="전체"||x.cat==current)&&(!q||x.label.includes(q)||x.cat.includes(q)||x.group.includes(q)));$("count").textContent="표시 "+arr.length+"개 / 전체 "+allItems().length+"개";const groups={};arr.forEach(x=>{const k=x.cat+" · "+x.group;(groups[k]??=[]).push(x)});Object.entries(groups).forEach(([g,items])=>{const d=document.createElement("details");d.open=!!q||current!="전체";const s=document.createElement("summary");s.textContent=g+" ("+items.length+")";d.appendChild(s);items.forEach(x=>{const k=key(x);const chip=document.createElement("span");chip.className="chip"+(selected.has(k)?" on":"");chip.textContent=x.label;chip.onclick=()=>{selected.has(k)?selected.delete(k):selected.add(k);renderList();renderSel()};d.appendChild(chip)});box.appendChild(d)});if(!arr.length)box.innerHTML='<div class="count">검색 결과 없음</div>'}
function renderSel(){const box=$("selectedList");box.innerHTML="";const arr=selectedItems();if(!arr.length)box.innerHTML='<span class="chip">선택 없음</span>';arr.forEach(x=>{const c=document.createElement("span");c.className="chip on";c.textContent="× "+x.label;c.onclick=()=>{selected.delete(key(x));renderList();renderSel()};box.appendChild(c)});renderProfile()}
function score(){const s={책임감:0,리더십:0,배려:0,자기주도성:0,성실성:0,표현력:0,성장가능성:0,탐구심:0,창의성:0};selectedItems().forEach(x=>{const l=x.label;if(x.cat.includes("리더십")||l.includes("반장")||l.includes("이끄")||l.includes("의견")){s.리더십+=3;s.책임감+=2}if(x.cat.includes("교우")||l.includes("친구")||l.includes("배려")||l.includes("공감"))s.배려+=3;if(x.cat.includes("학습")||l.includes("수학")||l.includes("발표")||l.includes("질문")){s.자기주도성+=2;s.표현력+=1}if(x.cat.includes("학교생활")||l.includes("규칙")||l.includes("정리")||l.includes("맡은")){s.성실성+=2;s.책임감+=2}if(x.cat.includes("성장"))s.성장가능성+=3;if(l.includes("호기심")||l.includes("탐구")||l.includes("관찰"))s.탐구심+=3;if(x.cat.includes("창의")||l.includes("창의")||l.includes("표현")||l.includes("미술"))s.창의성+=3});return s}
function stars(n){return "★".repeat(Math.min(5,Math.ceil(n/2)))} function renderProfile(){const a=Object.entries(score()).sort((a,b)=>b[1]-a[1]).filter(x=>x[1]>0);$("profileBox").innerHTML=a.length?a.map(([k,v])=>`<b>${k}</b> ${stars(v)}<br>`).join(""):"아직 선택한 키워드가 없습니다."}
function autoPick(){const memo=$("memo").value;allItems().forEach(x=>{const core=x.label.replace(/하는|있는|함|을|를|이|가|에게|에서|으로|하려는|모습/g,"").slice(0,4);if(core&&memo.includes(core))selected.add(key(x))});renderList();renderSel()} function clearAll(){selected.clear();$("memo").value="";$("student").value="";$("resultArea").textContent="생성 버튼을 누르면 결과가 표시됩니다.";renderList();renderSel()}
function byteLen(s){return new Blob([s]).size} function get(cat){return selectedItems().filter(x=>x.cat==cat).map(x=>x.label)} function one(arr,fb){return arr.length?arr[variant%arr.length]:fb} function phrase(type,b){return DB.P[type][variant%DB.P[type].length].replaceAll("{behavior}",b)} function growth(label){return label?(DB.G[label]||label+" 모습을 보이며, 관련 경험을 통해 긍정적인 방향으로 성장하고 있음."):"현재의 강점을 바탕으로 다양한 경험 속에서 자신의 역량을 더욱 넓혀 갈 것으로 기대됨."} function polish(t){return t.replace(/\s+/g," ").replace(/\.+/g,".").replace(/함 태도/g,"하는 태도").trim()}
function generateText(){const role=one(get("리더십"),"");const learn=one(get("학습"),one(get("학습태도"),one(get("장점"),"학습 활동에 성실하게 참여하는")));const life=one(get("학교생활"),"공동체의 약속을 소중히 여기는");const rel=one(get("교우관계"),"친구들과 원만하게 어울리며 협력하는");const art=one(get("예체능·창의"),"");const self=one(get("자기관리·진로"),"");const gp=one(get("성장 포인트"),"");const trait=one(get("성격·기질"),DB.T[variant%DB.T.length]);const parts=[];parts.push(DB.P.opening[variant%DB.P.opening.length].replace("{trait}",trait));if(role)parts.push(phrase("leadership",role));parts.push(phrase("learning",learn));parts.push(phrase("life",life));parts.push(phrase("relation",rel));if(art)parts.push(phrase("art",art));if(self)parts.push(self+" 태도를 바탕으로 자신의 강점과 부족한 점을 돌아보며 자기관리 역량을 키워 가고 있음.");parts.push(DB.P.growth[variant%DB.P.growth.length].replace("{growth}",growth(gp)));return polish(parts.join(" "))}
function generate(){const text=generateText();$("resultArea").innerHTML=`<div class="result"><div class="result-top"><span>최종 추천 · ${byteLen(text)} byte</span><button class="copy" id="copyBtn">복사</button></div><div class="txt">${text}</div></div>`;$("copyBtn").onclick=()=>{navigator.clipboard.writeText(document.querySelector(".txt").textContent);alert("복사했어요.")}}
init();
</script></body></html>
