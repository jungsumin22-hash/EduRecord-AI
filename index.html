<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>행발작성기 PRO v15</title>
<style>
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#fbf8f1,#f1efff);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Segoe UI,sans-serif;color:#25211d}header{max-width:1500px;margin:auto;padding:24px 28px 10px;display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:30px}p{color:#746c62}.badge{background:#211b48;color:white;border-radius:999px;padding:9px 14px;font-weight:900}main{max-width:1500px;margin:auto;padding:14px 28px 28px;display:grid;grid-template-columns:1.05fr 1fr;gap:18px}.card{background:#fffdf8;border:1px solid #e5ddd1;border-radius:22px;box-shadow:0 18px 45px rgba(60,44,20,.08);padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;font-weight:850;font-size:13px;margin-top:10px}input,select,textarea{width:100%;border:1px solid #e5ddd1;border-radius:14px;padding:12px;margin-top:7px;font-size:15px}textarea{min-height:150px}button{border:0;border-radius:14px;padding:12px 15px;font-weight:900;background:#5f4bff;color:white;cursor:pointer}.gray{background:#ede8df;color:#302b26}.btns{display:flex;gap:10px;margin-top:14px}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.tab{background:white;color:#302b26;border:1px solid #e5ddd1;border-radius:999px;padding:8px 12px;font-weight:900}.active{background:#5f4bff!important;color:white!important}.list{height:470px;overflow:auto;border:1px solid #e5ddd1;border-radius:18px;background:white;padding:10px}.group{font-size:13px;color:#746c62;font-weight:950;margin:13px 7px 8px}.chip{display:inline-flex;margin:5px;padding:8px 10px;border:1px solid #ddd6ff;background:#f1ecff;border-radius:999px;font-size:13px;cursor:pointer}.on{background:#211b48!important;color:white!important;border-color:#211b48!important;font-weight:900}.role{background:#fff3dd;border-color:#ffd595}.selected{min-height:90px;border:1px dashed #c7bfff;border-radius:16px;padding:10px;background:#fbfaff}.profile{min-height:115px;border:1px solid #e5ddd1;border-radius:16px;background:#fff;padding:13px;line-height:1.65}.score{display:grid;grid-template-columns:100px 1fr 42px;gap:8px;align-items:center;margin:6px 0}.bar{height:10px;background:#eee;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#16825a,#5f4bff)}.resultCard{grid-column:1/-1}.result{background:#fff;border:1px solid #e5ddd1;border-radius:18px;padding:16px;line-height:1.78;margin-top:12px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:#746c62;font-size:13px;font-weight:900}.copy{padding:8px 11px;font-size:12px;background:#211b48}@media(max-width:980px){main{grid-template-columns:1fr;padding:14px}.grid{grid-template-columns:1fr}}
</style></head><body>
<header><div><h1>📘 행발작성기 PRO v15</h1><p>영역별 키워드가 화면에 바로 뜨는 버전</p></div><span class="badge">키워드 표시 복구</span></header>
<main>
<section class="card"><h2>1. 학생 관찰 입력</h2><div class="grid"><label>학생 이름/번호<input id="student" placeholder="예: 김OO / 12번"></label><label>학년<select><option>전학년</option><option selected>5~6학년</option></select></label><label>분량<select id="target"><option value="650">650 byte</option><option value="750" selected>750 byte</option><option value="850">850 byte</option></select></label><label>문체<select><option>40년차 담임</option><option>공식</option></select></label></div><label>자유 메모<textarea id="memo" placeholder="예: 반장, 수학 노력, 친구를 잘 챙김, 규칙 지키게 함, 활발함"></textarea></label><div class="btns"><button onclick="autoPick()">메모로 자동 선택</button><button class="gray" onclick="clearAll()">초기화</button></div></section>
<section class="card"><h2>2. 관찰 행동 키워드 선택</h2><input id="search" placeholder="검색: 반장, 발표, 수학, 친구, 배려, 장난, 정리정돈..."><div id="tabs" class="tabs"></div><div id="list" class="list"></div></section>
<section class="card"><h2>3. 선택한 행동</h2><div id="selected" class="selected"></div><h3>학생 역량 분석</h3><div id="profile" class="profile">아직 선택한 행동이 없습니다.</div></section>
<section class="card resultCard"><h2>4. 행발 생성 결과</h2><div class="btns"><button onclick="generateAll()">✨ 행발 5개 생성</button><button class="gray" onclick="refineAll()">문장 다듬기</button></div><div id="results">생성 버튼을 누르면 결과가 표시됩니다.</div></section>
</main>
<script>
const DATA={"학습태도": {"수업 참여": ["발표를 자신 있게 함", "궁금한 점을 질문함", "수업에 집중함", "수학을 꾸준히 노력함", "글쓰기를 잘함", "독서를 좋아함", "과학 탐구를 좋아함", "학습 활동을 끝까지 완성함", "오답을 고쳐 다시 배움", "자료를 스스로 찾아봄"], "탐구 사고": ["사소한 현상에도 궁금증을 가짐", "원인을 끝까지 확인하려 함", "다양한 해결 방법을 찾아봄", "논리적으로 설명하려 함", "새로운 아이디어를 제안함"]}, "생활지도": {"기본 생활": ["규칙을 잘 지킴", "인사를 잘함", "정리정돈을 잘함", "준비물을 잘 챙김", "약속 시간을 잘 지킴", "안전수칙을 잘 지킴", "맡은 일을 끝까지 마무리함", "차분하게 행동함"], "태도 성장": ["활발하고 에너지가 있음", "차분하고 신중함", "장난기가 있으나 친구들과 잘 어울림", "실수를 인정하고 수정하려 함", "상황 판단이 빠름", "꾸준히 노력하는 태도가 있음"]}, "교우관계": {"배려 공감": ["친구를 잘 도와줌", "친구의 말을 끝까지 들음", "혼자 있는 친구를 챙김", "친구가 힘들어하면 먼저 다가감", "친구를 위로하고 격려함", "배려하는 말투를 사용함"], "협력 관계": ["모둠활동에서 협력함", "친구의 의견을 존중함", "갈등을 조정하려 함", "학급 분위기를 밝게 만듦", "친구들에게 신뢰를 얻음"]}, "리더십": {"역할 수행": ["반장", "부반장", "모둠장", "학습부장", "환경부장", "도서부장", "체육부장", "안전부장"], "이끔 조율": ["친구들의 의견을 모아 정리함", "역할을 공평하게 나눔", "앞장서서 실천함", "친구들의 참여를 독려함", "학급 분위기를 긍정적으로 이끔"]}, "자기관리": {"계획 실천": ["목표를 세우고 실천함", "해야 할 일을 스스로 확인함", "과제를 끝까지 해결하려 함", "부족한 부분을 보완하려 함", "피드백을 받아들이려 함", "실패 후 다시 시도함"]}, "창의예체능": {"표현 창작": ["자신만의 방식으로 표현함", "새로운 표현 방법을 시도함", "색채 감각이 좋음", "상상력이 풍부함", "작품을 끝까지 완성함", "음악 활동을 즐김"]}, "성장": {"성장 변화": ["학습 태도가 좋아짐", "발표 자신감이 향상됨", "자기조절이 향상됨", "정리정돈 습관이 좋아짐", "친구 관계가 좋아짐", "책임감이 향상됨"]}};
let selected=new Set(), current="전체";
const $=id=>document.getElementById(id);
function allItems(){let a=[];Object.entries(DATA).forEach(([cat,groups])=>Object.entries(groups).forEach(([group,items])=>items.forEach(label=>a.push({cat,group,label}))));return a}
function init(){renderTabs();renderList();renderSelected();$("search").addEventListener("input",renderList)}
function renderTabs(){$("tabs").innerHTML="";["전체",...Object.keys(DATA)].forEach(c=>{let b=document.createElement("button");b.className="tab"+(c===current?" active":"");b.textContent=c;b.onclick=()=>{current=c;renderTabs();renderList()};$("tabs").appendChild(b)})}
function renderList(){let q=$("search").value.trim();let box=$("list");box.innerHTML="";let source=allItems().filter(x=>(current==="전체"||x.cat===current)&&(!q||x.label.includes(q)||x.cat.includes(q)||x.group.includes(q)));let groups={};source.forEach(x=>{let k=x.cat+" · "+x.group;(groups[k]??=[]).push(x)});Object.entries(groups).forEach(([g,items])=>{let title=document.createElement("div");title.className="group";title.textContent=g;box.appendChild(title);items.forEach(x=>{let key=x.cat+"||"+x.group+"||"+x.label;let s=document.createElement("span");s.className="chip"+(selected.has(key)?" on":"")+(x.cat==="리더십"?" role":"");s.textContent=x.label;s.onclick=()=>{selected.has(key)?selected.delete(key):selected.add(key);renderList();renderSelected()};box.appendChild(s)})});if(!source.length)box.innerHTML='<div class="group">검색 결과가 없습니다.</div>'}
function selectedItems(){return [...selected].map(k=>{let [cat,group,label]=k.split("||");return {cat,group,label}})}
function renderSelected(){let box=$("selected");box.innerHTML="";let arr=selectedItems();if(!arr.length)box.innerHTML='<span class="chip">선택 없음</span>';arr.forEach(x=>{let key=x.cat+"||"+x.group+"||"+x.label;let s=document.createElement("span");s.className="chip on";s.textContent="× "+x.label;s.onclick=()=>{selected.delete(key);renderList();renderSelected()};box.appendChild(s)});renderProfile()}
function compOf(x){let l=x.label, sc={};function add(k,v){sc[k]=(sc[k]||0)+v}; if(x.cat==="리더십"||l.includes("반장")){add("리더십",5);add("책임감",4)} if(x.cat==="교우관계"||l.includes("친구")){add("배려",5);add("협력",4)} if(x.cat==="학습태도"||l.includes("수학")||l.includes("발표")||l.includes("질문")){add("자기주도성",4);add("학습열의",4)} if(x.cat==="생활지도"||l.includes("규칙")||l.includes("정리")){add("자기관리",4);add("규칙준수",4)} if(x.cat==="창의예체능"||l.includes("표현")){add("창의성",5);add("표현력",4)} if(x.cat==="성장"||l.includes("향상")){add("성장가능성",5)} return sc}
function scores(){let sc={};selectedItems().forEach(x=>Object.entries(compOf(x)).forEach(([k,v])=>sc[k]=(sc[k]||0)+v));return sc}
function renderProfile(){let t=Object.entries(scores()).sort((a,b)=>b[1]-a[1]).slice(0,7);let box=$("profile");if(!t.length){box.textContent="아직 선택한 행동이 없습니다.";return}let max=Math.max(...t.map(x=>x[1]),1);box.innerHTML="";t.forEach(([k,v])=>{let row=document.createElement("div");row.className="score";row.innerHTML=`<span>${k}</span><span class="bar"><span class="fill" style="width:${Math.round(v/max*100)}%"></span></span><span>${v}</span>`;box.appendChild(row)})}
function autoPick(){let memo=$("memo").value;allItems().forEach(x=>{if(memo.includes(x.label.slice(0,2)))selected.add(x.cat+"||"+x.group+"||"+x.label)});renderList();renderSelected()}
function clearAll(){selected.clear();$("memo").value="";$("results").textContent="생성 버튼을 누르면 결과가 표시됩니다.";renderList();renderSelected()}
function byteLen(s){return new Blob([s]).size}
function makeText(i){let arr=selectedItems(), labels=arr.map(x=>x.label);let role=labels.find(x=>x.includes("반장")||x.includes("모둠장"));let learn=(arr.find(x=>x.cat==="학습태도")||{label:"학습 활동에 성실하게 참여함"}).label;let life=(arr.find(x=>x.cat==="생활지도")||{label:"학교생활에서 기본적인 약속을 지키려는 태도를 보임"}).label;let friend=(arr.find(x=>x.cat==="교우관계")||{label:"친구들과 원만하게 어울리며 협력하는 태도를 보임"}).label;let lead=role?`${role} 역할을 통해 맡은 일을 책임감 있게 수행하며 학급 공동체에 기여함.`:`학교생활 전반에 성실하게 참여하며 자신의 강점을 다양한 활동 속에서 드러냄.`;return polish([lead,`${learn} 과정에서 스스로 노력하려는 태도가 나타나며 배움에 대한 관심을 꾸준히 키워감.`,`${friend} 또한 ${life}`, "현재의 긍정적인 태도를 바탕으로 앞으로도 학습과 관계 속에서 안정적인 성장이 기대됨."].join(" "))}
function polish(s){return s.replace(/\s+/g," ").replace(/함 과정/g,"하는 과정").replace(/\.\s*\./g,".").trim()}
function generateAll(){let box=$("results");box.innerHTML="";for(let i=0;i<5;i++){let text=makeText(i);let div=document.createElement("div");div.className="result";div.innerHTML=`<div class="top"><span>추천 ${i+1} · ${byteLen(text)} byte</span><button class="copy">복사</button></div><div class="txt">${text}</div>`;div.querySelector("button").onclick=()=>{navigator.clipboard.writeText(text);alert("복사했어요.")};box.appendChild(div)}}
function refineAll(){document.querySelectorAll(".txt").forEach(x=>x.textContent=polish(x.textContent))}
init();
</script></body></html>
