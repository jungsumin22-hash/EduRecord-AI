<style>
*{box-sizing:border-box}
body{margin:0;background:#f7f3ec;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',Segoe UI,sans-serif;color:#222}

.list{height:500px;overflow:auto;border:1px solid #e3ddd4;border-radius:18px;background:#fff;padding:10px}

<body>

<main>

<section class="card"><h2>3. 선택한 키워드</h2><div id="selected" class="selected"></div><h3>학생 성향 분석</h3><div id="profile" class="profile">아직 선택한 키워드가 없습니다.</div></section>
<section class="card resultCard"><h2>4. 생성 결과</h2><div class="btns"><button onclick="generate()">✨ 행발 생성하기</button><button class="gray" onclick="regenerate()">다시 생성</button></div><div id="results">생성 버튼을 누르면 결과가 표시됩니다.</div></section>
</main>

    if (!groups[k]) groups[k] = [];
    groups[k].push(x);
  });
  Object.entries(groups).forEach(([g, items]) => {
    const title = document.createElement("div");
    title.className = "group";
    title.textContent = g;
    box.appendChild(title);
    items.forEach(x => {
      const key = x.cat + "||" + x.group + "||" + x.label;
      const s = document.createElement("span");
      s.className = "chip" + (selected.has(key) ? " on" : "");
      s.textContent = x.label;
      s.onclick = () => {
        selected.has(key) ? selected.delete(key) : selected.add(key);
        renderList();
        renderSelected();
      };
      box.appendChild(s);
    });
  });
}
function selectedItems(){
  return [...selected].map(k => {
    const [cat, group, label] = k.split("||");
    return {cat, group, label};
  });
}
function renderSelected(){
  const box = $("selected");
  box.innerHTML = "";
  const arr = selectedItems();
  if (!arr.length) box.innerHTML = '<span class="chip">선택 없음</span>';
  arr.forEach(x => {
    const key = x.cat + "||" + x.group + "||" + x.label;
    const s = document.createElement("span");
    s.className = "chip on";
    s.textContent = "× " + x.label;
    s.onclick = () => { selected.delete(key); renderList(); renderSelected(); };
    box.appendChild(s);
  });
  renderProfile();
}
function score(){
  const s = {책임감:0, 리더십:0, 배려:0, 자기주도성:0, 성실성:0, 표현력:0, 성장가능성:0};
  selectedItems().forEach(x => {
    const l = x.label;
    if (x.cat.includes("리더십") || l.includes("반장") || l.includes("이끄")) { s.리더십 += 3; s.책임감 += 2; }
    if (x.cat.includes("교우") || l.includes("친구") || l.includes("배려")) { s.배려 += 3; }
    if (x.cat.includes("학습") || l.includes("수학") || l.includes("발표") || l.includes("질문")) { s.자기주도성 += 2; s.표현력 += 1; }
    if (x.cat.includes("학교생활") || l.includes("규칙") || l.includes("정리") || l.includes("맡은")) { s.성실성 += 2; s.책임감 += 2; }
    if (x.cat.includes("성장")) { s.성장가능성 += 3; }
  });
  return s;
}
function stars(n){ return "★".repeat(Math.min(5, Math.ceil(n/2))); }
function renderProfile(){
  const sc = score();
  const arr = Object.entries(sc).sort((a,b)=>b[1]-a[1]).filter(x=>x[1]>0);
  $("profile").innerHTML = arr.length ? arr.map(([k,v]) => "<b>"+k+"</b> "+stars(v)+"<br>").join("") : "아직 선택한 키워드가 없습니다.";
}
function autoPick(){
  const memo = $("memo").value;
  allItems().forEach(x => {
    const core = x.label.replace(/하는|있는|함|을|를|이|가/g,"").slice(0,4);
    if (core && memo.includes(core)) selected.add(x.cat+"||"+x.group+"||"+x.label);
  });
  renderList();
  renderSelected();
}
function clearAll(){
  selected.clear();
  $("memo").value = "";
  $("results").textContent = "생성 버튼을 누르면 결과가 표시됩니다.";
  renderList();
  renderSelected();
}
function byteLen(s){ return new Blob([s]).size; }
function get(cat){ return selectedItems().filter(x => x.cat === cat).map(x => x.label); }
function one(arr, def){ return arr.length ? arr[variant % arr.length] : def; }
function convertGrowth(label){
  if(!label) return "";
  const m = {
    "혼자 해결하려는 경향이 있는":"자신의 힘으로 해결하려는 의지가 있어 협력 경험을 통해 사고의 폭을 넓혀 가고 있음.",
    "친한 친구에게 의존하는 경향이 있는":"친구와 함께하는 활동에서 안정감을 느끼며 점차 스스로 선택하고 표현하는 경험을 넓혀 가고 있음.",
    "감정 표현이 급하게 나오는":"자신의 감정을 솔직하게 표현하는 편으로 상황에 맞는 표현 방법을 익혀 가고 있음.",
    "규칙보다 자신의 생각을 먼저 말하는":"자신의 생각이 분명하여 공동체의 약속과 조화를 이루는 경험을 통해 성장하고 있음.",
    "장난이 길어질 때가 있는":"밝고 유쾌한 에너지를 지니고 있어 상황에 맞게 조절하는 경험을 통해 관계 역량을 넓혀 가고 있음."
  };
  return m[label] || label + " 모습을 보이며, 관련 경험을 통해 긍정적인 방향으로 성장하고 있음.";
}
function generateText(){
  const role = one(get("리더십"), "");
  const learn = one(get("학습"), one(get("장점"), "학습 활동에 성실하게 참여하는"));
  const life = one(get("학교생활"), "학교생활에서 기본적인 약속을 지키려는");
  const rel = one(get("교우관계"), "친구들과 원만하게 어울리며 협력하는");
  const art = one(get("예체능·창의"), "");
  const self = one(get("자기관리·진로"), "");
  const growth = convertGrowth(one(get("성장 포인트"), one(get("성장"), "")));
  const parts = [];
  if(role) parts.push(role + " 모습을 바탕으로 학급의 여러 활동에 책임감 있게 참여하며, 친구들의 의견을 살피고 공동체 안에서 자신의 역할을 성실히 수행함.");
  else parts.push("학교생활 전반에서 자신에게 주어진 일을 차분히 수행하며, 학급의 흐름을 살피고 필요한 활동에 성실하게 참여함.");
  parts.push(learn + " 태도가 나타나며, 배운 내용을 자신의 방식으로 이해하고 표현하려는 노력이 꾸준함.");
  parts.push(rel + " 모습이 자연스럽게 나타나고, " + life + " 태도로 안정적인 학교생활을 이어감.");
  if(art) parts.push(art + " 과정에서 자신의 생각과 감수성을 구체적으로 드러내며 활동의 완성도를 높이려는 모습이 보임.");
  if(self) parts.push(self + " 태도를 바탕으로 자신의 강점과 부족한 점을 돌아보며 자기관리 역량을 키워 가고 있음.");
  if(growth) parts.push(growth);
  parts.push("현재의 성실함과 관계 맺는 태도를 바탕으로 앞으로도 학습과 생활 전반에서 꾸준한 성장이 기대되는 학생임.");
  return polish(parts.join(" "));
}
function polish(s){
  return s.replace(/\s+/g," ").replace(/\.+/g,".").replace(/함 태도/g,"하는 태도").trim();
}
function generate(){
  const text = generateText();
  $("results").innerHTML = '<div class="result"><div class="top"><span>최종 추천 · '+byteLen(text)+' byte</span><button class="copy" id="copyBtn">복사</button></div><div class="txt">'+text+'</div></div>';
  document.getElementById("copyBtn").onclick = function(){
    navigator.clipboard.writeText(document.querySelector(".txt").textContent);
    alert("복사했어요.");
  };
}
function regenerate(){ variant++; generate(); }
init();
</script>
</body></html>
